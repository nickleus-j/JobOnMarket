<div class="register-container">
  <h2>Create an Account</h2>
  
  <!-- formGroup binds to the registerForm in your .ts file -->
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <input 
        id="roleName" 
        type="hidden" 
        formControlName="roleName" 
      />
    <!-- Email Field -->
    <div class="form-group">
      <label for="email">Email Address</label>
      <input 
        id="userName" 
        type="email" 
        formControlName="userName" 
        placeholder="Enter your email"
      >
      <div *ngIf="registerForm.get('userName')?.touched && registerForm.get('userName')?.invalid" class="error">
        <small *ngIf="registerForm.get('userName')?.errors?.['required']">Email is required.</small>
        <small *ngIf="registerForm.get('userName')?.errors?.['email']">Enter a valid email address.</small>
      </div>
    </div>

    <!-- Password Field -->
    <div class="form-group">
      <label for="unhashedPassword">Password</label>
      <input 
        id="password" 
        type="password" 
        formControlName="unhashedPassword" 
        placeholder="Minimum 6 characters"
      >
      <div *ngIf="registerForm.get('unhashedPassword')?.touched && registerForm.get('unhashedPassword')?.invalid" class="error">
        <small *ngIf="registerForm.get('unhashedPassword')?.errors?.['required']">Password is required.</small>
        <small *ngIf="registerForm.get('unhashedPassword')?.errors?.['minlength']">Password must be at least 6 characters.</small>
      </div>
    </div>
    <div class="form-group">
        <label for="unhashedPassword">First Name</label>
      <input 
        id="firstName" 
        type="text" 
        formControlName="firstName" 
        placeholder="Enter Name"
      >
    </div>
    <div class="form-group">
        <label for="unhashedPassword">Surname</label>
      <input 
        id="surname" 
        type="text" 
        formControlName="surname" 
        placeholder="Enter surname"
      >
    </div>
    <!-- Submit Button -->
    <button type="submit" [disabled]="registerForm.invalid">
      Register
    </button>

    <p>Already have an account? <a routerLink="/login" class="btn">Login here</a></p>
  </form>
</div>
