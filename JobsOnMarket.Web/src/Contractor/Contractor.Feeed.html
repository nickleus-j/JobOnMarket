<h1>Contractors to Choose</h1>
@if (dataFetch$ | async; as data) {
<div class="feed"  >
@for (item of data; track item.id) {
        <div class="contractor-card">
            <h3>{{item.name}}</h3>
            <small>Rating: {{item.rating}}/5</small><br>
            <a class="btn" >View Details</a>
        </div>
    }
</div>
}
