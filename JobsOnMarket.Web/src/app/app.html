 <nav>
  <!-- If NOT authenticated -->
  <ng-container *ngIf="!(authService.authStatus$ | async); else loggedInTemplate">
    <a routerLink="/login">LogIn</a>
    <a routerLink="/register">Register</a>
  </ng-container>

  <!-- If authenticated -->
  <ng-template #loggedInTemplate>
    <a routerLink="/jobs">Job</a>
    <button (click)="onLogout()">Log Out</button>
  </ng-template>
</nav>
<h1>Hello, {{ title() }}</h1>
<main class="main">
 
  <div class="content">
    <router-outlet />
  </div>
  

</main>
