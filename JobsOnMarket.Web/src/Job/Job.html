@if (dataFetch$ | async; as data) {
<div class="job-card">
    <h3>{{data.description}} </h3>
    
    <p>
        {{data.currency.code}} {{data.budget}}
    </p>
    <div>
        <b>start date</b><small>  {{data.startDate | date: 'short' }}</small><br>
        <b>due date</b><small> {{data.dueDate | date: 'short' }}</small><br/>
        <a class="btn" href="/jobs">Back</a>
    </div>
    
</div>
}
